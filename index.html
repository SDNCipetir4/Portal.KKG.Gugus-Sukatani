<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal KKG SD Gugus Sukatani</title>
    <style>
        /* Reset dasar agar tidak ada ruang kosong di pinggir */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah scroll ganda di luar iframe */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa; /* Warna latar belakang fallback */
        }

        /* Container untuk layar loading */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        /* Animasi Spinner Modern */
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(52, 152, 219, 0.2);
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        /* Teks di bawah spinner */
        .loading-text {
            color: #4a5568;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Iframe untuk Apps Script */
        #app-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0; /* Disembunyikan awalnya */
            transition: opacity 0.8s ease; /* Transisi halus saat muncul */
        }

        /* Keyframes untuk animasi */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Menghubungkan ke Server...</div>
    </div>

    <iframe 
        id="app-frame" 
  src="https://script.google.com/macros/s/AKfycbxeMx0J5TS17miqKJtArmgZ7a7cs1jeq10f_P0yzh5zuGRLYgV9Y2HMxS8zI2ang4cqMg/exec" 
        allowfullscreen>
    </iframe>

    <script>
        // Mengambil elemen HTML
        const iframe = document.getElementById('app-frame');
        const loadingScreen = document.getElementById('loading-screen');

        // Event listener saat iframe selesai dimuat sepenuhnya
        iframe.addEventListener('load', function() {
            // Memudarkan layar loading
            loadingScreen.style.opacity = '0';
            loadingScreen.style.visibility = 'hidden';
            
            // Memunculkan iframe aplikasi
            iframe.style.opacity = '1';
        });
    </script>

</body>
</html>
